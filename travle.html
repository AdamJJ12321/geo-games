<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Connector</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <main class="game-shell">
    <section class="map-stage route-stage" aria-label="Country connector map game">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Country connector</p>
          <h1>Connect the two countries</h1>
        </div>
        <div class="top-actions">
          <a class="icon-button quiet-button" href="index.html">Home</a>
          <button class="icon-button quiet-button" id="show-answer" type="button">Show route</button>
          <button class="icon-button" id="new-game" type="button">New</button>
        </div>
      </header>

      <div class="route-banner" id="route-banner" aria-live="polite">Loading route...</div>

      <div class="map-wrap">
        <svg class="world-map" id="world-map" viewBox="0 40 1060 660" role="img" aria-label="World map without country borders"></svg>
        <div class="guess-callout" id="guess-callout" aria-live="polite"></div>
      </div>

      <div class="legend" aria-label="Route color legend">
        <span><i style="background:#242018"></i>Start and end</span>
        <span><i style="background:#58714e"></i>Shortest route country</span>
        <span><i style="background:#ad7340"></i>Not on shortest route</span>
        <span><i style="background:#6e7355"></i>Revealed route</span>
      </div>
    </section>

    <section class="guess-dock" aria-label="Country route guesses">
      <form class="guess-form" id="guess-form">
        <label class="sr-only" for="country-input">Guess a country in between</label>
        <input id="country-input" list="country-options" autocomplete="off" placeholder="Guess a country in between" />
        <datalist id="country-options"></datalist>
        <button type="submit">Guess</button>
      </form>
      <p class="status-line" id="status-line">Guess the countries that connect the endpoints.</p>
      <ol class="guess-history route-history" id="guess-history"></ol>
    </section>
  </main>

  <script src="countries-data.js?v=4"></script>
  <script src="travle.js?v=6"></script>
</body>
</html>
