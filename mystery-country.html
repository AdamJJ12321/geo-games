<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mystery Country</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <main class="game-shell">
    <section class="map-stage" aria-label="Mystery country map game">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Mystery country</p>
          <h1>Find the hidden country</h1>
        </div>
        <div class="top-actions">
          <a class="icon-button quiet-button" href="index.html">Home</a>
          <button class="icon-button quiet-button" id="give-up" type="button">I give up</button>
          <button class="icon-button" id="new-game" type="button" title="New mystery country" aria-label="New mystery country">New</button>
        </div>
      </header>

      <div class="map-wrap">
        <svg class="world-map" id="world-map" viewBox="0 40 1060 660" role="img" aria-label="World map without country borders"></svg>
        <div class="guess-callout" id="guess-callout" aria-live="polite"></div>
      </div>

      <div class="legend" aria-label="Distance color legend">
        <span><i style="background:#efe6bf"></i>Very very far</span>
        <span><i style="background:#d8c26b"></i>Very far</span>
        <span><i style="background:#bf9344"></i>Far</span>
        <span><i style="background:#ad673d"></i>Medium</span>
        <span><i style="background:#9e4c3d"></i>Pretty close</span>
        <span><i style="background:#893441"></i>Close</span>
        <span><i style="background:#672b3c"></i>Very close</span>
        <span><i style="background:#4b2830"></i>Adjacent</span>
        <span><i style="background:#58714e"></i>Correct</span>
      </div>
    </section>

    <section class="guess-dock" aria-label="Country guesses">
      <form class="guess-form" id="guess-form">
        <label class="sr-only" for="country-input">Guess a country</label>
        <input id="country-input" list="country-options" autocomplete="off" placeholder="Guess a country" />
        <datalist id="country-options"></datalist>
        <button type="submit">Guess</button>
      </form>
      <p class="status-line" id="status-line">A mystery country is ready.</p>
      <ol class="guess-history" id="guess-history"></ol>
    </section>
  </main>

  <script src="countries-data.js?v=4"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
